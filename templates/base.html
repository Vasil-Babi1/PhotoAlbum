<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Фотоальбом{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body class="d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-dark-subtle">
  <div class="container">
    <a class="navbar-brand fw-semibold" href="/">
      <i class="bi bi-images me-2"></i>PhotoAlbum
    </a>

    <div class="ms-auto d-flex gap-2">
      <a class="btn btn-outline-light btn-sm" href="/login">
        <i class="bi bi-box-arrow-in-right me-1"></i>Увійти
      </a>
      <a class="btn btn-light btn-sm" href="/register">
        <i class="bi bi-person-plus me-1"></i>Реєстрація
      </a>
    </div>
  </div>
</nav>

<main class="container my-4 flex-grow-1">
  {% block content %}{% endblock %}
</main>

<footer class="py-4 footer-soft mt-auto">
  <div class="container text-center text-muted small">
    © 2026 PhotoAlbum
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
