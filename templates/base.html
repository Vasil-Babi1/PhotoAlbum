<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}PhotoAlbum{% endblock %}</title>


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-dark-subtle">
  <div class="container">
    <a class="navbar-brand fw-semibold" href="/">
      <i class="bi bi-images me-2"></i>PhotoAlbum
    </a>
  </div>
</nav>

<div class="container my-4">
  {% block content %}{% endblock %}
</div>

<footer class="py-4 mt-5 footer-soft">
  <div class="container text-center text-muted small">
    © PhotoAlbum
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
